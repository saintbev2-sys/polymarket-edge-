<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Hub • Saint Bev</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#eef2ff;font-family:'Space Grotesk',sans-serif;padding:20px 16px 60px}
h1{font-size:1.9rem;font-weight:800;background:linear-gradient(135deg,#fff,#c6aaff);-webkit-background-clip:text;background-clip:text;color:transparent}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer;transition:.15s}
.wrap{max-width:900px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:12px}
.btn-new{background:#a78bfa;border:none;border-radius:60px;padding:10px 22px;font-weight:700;color:#000;font-size:14px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:#0c0c10;border-radius:18px;padding:14px 0;text-align:center;border:1px solid #1e1e24}
.stat-val{font-size:24px;font-weight:800}
.stat-lbl{font-size:10px;color:#5a5a6e;margin-top:3px;letter-spacing:1px}
.tabs{display:flex;gap:3px;background:#101014;border-radius:50px;padding:4px;margin-bottom:20px;border:1px solid #2a2a30;overflow-x:auto}
.tab{background:transparent;color:#bbb;border:none;border-radius:50px;padding:8px 14px;font-weight:500;font-size:12px;white-space:nowrap}
.tab.active{background:#a78bfa;color:#000}
.panel{background:#0a0a0e;border:1px solid #1a1a20;border-radius:28px;padding:20px 16px}
.hidden{display:none!important}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.fbtn{background:#16161c;border:none;border-radius:40px;padding:5px 13px;color:#ccc;font-size:12px;cursor:pointer}
.fbtn.on{color:#000}
.ccard{background:#0e0e12;border-radius:18px;padding:15px;border:1px solid #26262c;margin-bottom:10px}
.ctop{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ctag{border-radius:40px;padding:3px 10px;font-size:11px;font-weight:600;display:inline-block}
.ctitle{font-size:15px;font-weight:700;margin-top:7px}
.cacts{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.cacts select{background:#1d1d24;border:1px solid #2f2f3a;border-radius:30px;padding:5px 8px;color:white;font-size:11px}
.ibtn{background:#282832;border:none;border-radius:20px;padding:5px 10px;font-size:12px;color:#ccc}
.dbtn{background:#2a1a1f;color:#ff8a8a}
.cbar{height:5px;background:#1e1e24;border-radius:10px;overflow:hidden;margin-top:10px}
.cfill{height:100%;background:linear-gradient(90deg,#a78bfa,#c084fc);border-radius:10px}
.clbl{display:flex;justify-content:space-between;font-size:11px;color:#777;margin-bottom:3px}
.cnotes{font-size:12px;color:#ababb5;margin-top:9px;border-left:2px solid #2c2c34;padding-left:10px}
.cdate{font-size:10px;color:#5f5f73;margin-top:7px}
.empty{text-align:center;color:#444;padding:40px;font-size:14px}
.aibox{background:#0c0c12;border:1px solid #1e1e2a;border-radius:18px;padding:14px;margin-bottom:18px}
.ailbl{font-size:10px;color:#a78bfa;letter-spacing:2px;margin-bottom:8px}
.airow{display:flex;gap:8px}
.aiinput{flex:1;background:#16161e;border:1px solid #2a2a34;border-radius:12px;padding:9px 12px;color:white;font-size:13px;outline:none}
.aibtn{background:#a78bfa;border:none;border-radius:12px;padding:9px 14px;color:#000;font-weight:700;font-size:12px}
.aibtn:disabled{background:#1a1a24;color:#555}
.aires{margin-top:10px;padding:12px;background:#08080f;border:1px solid #2a2a3a;border-radius:12px;font-size:13px;color:#ccc;line-height:1.8;white-space:pre-wrap}
.kcard{background:#0b0b0f;border-radius:18px;border:1px solid #1e1e26;margin-bottom:10px;overflow:hidden}
.kinner{padding:14px}
.kbadges{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.kedge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:700;letter-spacing:1px}
.kcat{font-size:10px;color:#555;letter-spacing:1px}
.kvol{font-size:10px;background:#191920;padding:2px 8px;border-radius:20px;color:#888}
.ktitle{font-weight:600;font-size:14px;line-height:1.3}
.krow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.kright{text-align:right;flex-shrink:0}
.kpick{font-size:20px;font-weight:800}
.kodds{font-size:11px;color:#555}
.kbtns{display:flex;gap:8px;margin-top:10px}
.kdive{flex:1;padding:8px;background:#141418;border:1px solid #2a2a34;border-radius:10px;color:#888;font-size:11px;cursor:pointer}
.klink{padding:8px 12px;background:#141418;border:1px solid #2a2a34;border-radius:10px;color:#a78bfa;font-size:11px;text-decoration:none;display:flex;align-items:center}
.kanalysis{border-top:1px solid #1e1e26;padding:14px;background:#070710}
.pcard{background:#0b0b0f;border-radius:18px;padding:13px 15px;border:1px solid #222;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;text-decoration:none}
.pq{flex:2;font-weight:500;font-size:13px;color:#f0f0ff}
.podds{font-family:'DM Mono',monospace;font-weight:600;font-size:17px;color:#c084fc}
.pvol{font-size:11px;background:#191920;padding:3px 9px;border-radius:30px;color:#aaa}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.scard{background:#0c0c10;border-radius:18px;padding:13px;border:1px solid #24242c}
.stop{display:flex;justify-content:space-between;align-items:center}
.sname{font-weight:700;font-size:13px}
.ssym{font-size:10px;background:#19191f;padding:2px 7px;border-radius:20px;color:#666}
.sprice{font-size:19px;font-weight:600;margin-top:7px}
.schange{font-size:12px;margin-top:3px}
.scat{font-size:10px;color:#6e6e86;margin-top:5px}
.aihero{background:linear-gradient(135deg,#0b0b1a,#101018);border-radius:28px;padding:22px;border:1px solid #2a2a36;margin-bottom:18px}
.aisnap{background:#00000055;border-radius:20px;margin-top:14px;padding:14px}
.aisnapstats{display:flex;gap:18px;flex-wrap:wrap;margin-top:8px}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.mbox{background:#111116;border:1px solid #2a2a2e;border-radius:28px;width:100%;max-width:480px;padding:22px;max-height:88vh;overflow-y:auto}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mtitle{font-size:20px;font-weight:700}
.mclose{background:#2a2a32;border:none;border-radius:50%;width:34px;height:34px;font-size:16px;color:#ccc;cursor:pointer;flex-shrink:0}
.mfield{background:#1a1a20;border:1px solid #2e2e36;border-radius:14px;padding:10px 13px;color:white;font-size:13px;width:100%;display:block;margin-bottom:10px;outline:none}
.mrow{display:flex;gap:8px;margin-bottom:10px}
.mrow .mfield{margin-bottom:0}
.mlbl{font-size:12px;color:#888;margin-bottom:5px;display:block}
textarea.mfield{resize:vertical;min-height:58px}
.mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.mcancel{background:#1f1f26;border:none;border-radius:30px;padding:9px 16px;color:#bbb;cursor:pointer}
.msave{background:#a78bfa;border:none;border-radius:30px;padding:9px 20px;color:#000;font-weight:700;cursor:pointer}
.rowbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.rowbar h3{font-weight:600;font-size:15px}
.rbtn{background:#1e1e26;border:none;border-radius:20px;padding:5px 12px;font-size:12px;color:#ccc;cursor:pointer}
.save-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a26;border:1px solid #a78bfa44;border-radius:30px;padding:8px 18px;font-size:12px;color:#a78bfa;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.save-toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>PREDICTION HUB</h1>
      <div style="color:#9292aa;font-size:12px;margin-top:3px">SAINT BEV · track your edge</div>
    </div>
    <button class="btn-new" id="btnNew">+ New call</button>
  </div>
  <div class="stat-grid" id="stats"></div>
  <div class="tabs" id="tabBar">
    <button class="tab active" data-tab="mycalls">📋 My Calls</button>
    <button class="tab" data-tab="kalshi">🎯 Kalshi</button>
    <button class="tab" data-tab="markets">🎲 Polymarket</button>
    <button class="tab" data-tab="stocks">📈 Stocks</button>
    <button class="tab" data-tab="ai">🤖 BEV·AI</button>
  </div>
  <div class="panel">
    <div id="mycalls"></div>
    <div id="kalshi" class="hidden"></div>
    <div id="markets" class="hidden"></div>
    <div id="stocks" class="hidden"></div>
    <div id="ai" class="hidden"></div>
  </div>
</div>

<div id="modal" class="hidden">
  <div class="mbox">
    <div class="mhead">
      <div class="mtitle" id="mtitle">➕ New prediction</div>
      <button class="mclose" id="btnClose">✕</button>
    </div>
    <input class="mfield" id="mTitle" placeholder="Prediction title *">
    <div class="mrow">
      <select class="mfield" id="mCat">
        <option>Crypto</option><option>Politics</option><option>Energy/Gas</option>
        <option>Geopolitics</option><option>Stocks</option><option>Other</option><option>Sports</option>
      </select>
      <select class="mfield" id="mCall"><option>YES</option><option>NO</option></select>
    </div>
    <label class="mlbl" id="confLbl">Confidence: 70%</label>
    <input type="range" min="0" max="100" value="70" id="mConf" style="width:100%;accent-color:#a78bfa;margin-bottom:10px">
    <select class="mfield" id="mOut">
      <option value="pending">⏳ Pending</option>
      <option value="correct">✅ Correct</option>
      <option value="incorrect">❌ Incorrect</option>
    </select>
    <input class="mfield" id="mSrc" placeholder="Source URL (optional)">
    <textarea class="mfield" id="mNotes" placeholder="Notes / thesis ..."></textarea>
    <div class="mfoot">
      <button class="mcancel" id="btnCancel">Cancel</button>
      <button class="msave" id="btnSave">Save →</button>
    </div>
  </div>
</div>

<div class="save-toast" id="toast">💾 saved</div>

<script>
const CAT_COLOR={Crypto:"#f7931a",Politics:"#a78bfa","Energy/Gas":"#fb923c",Geopolitics:"#f43f5e",Stocks:"#34d399",Other:"#94a3b8",Sports:"#ff8c42"};
const EDGE={"+EV":{bg:"#0a2a0a",br:"#00cc44",tx:"#00ff55"},"FAIR":{bg:"#1a1a00",br:"#ccaa00",tx:"#ffcc00"},"AVOID":{bg:"#2a0a0a",br:"#cc2200",tx:"#ff4422"},"MONITOR":{bg:"#0a1a2a",br:"#0088cc",tx:"#00aaff"}};
const KM=[
  {id:"k1",title:"Strait of Hormuz traffic normal before Sep 1, 2026",odds:46,vol:"$15.9M",cat:"Geopolitics",pick:"NO",edge:"+EV"},
  {id:"k2",title:"WTI Oil above $90 before Aug 1, 2026",odds:41,vol:"$4.2M",cat:"Energy/Gas",pick:"YES",edge:"+EV"},
  {id:"k3",title:"Spurs win 2026 NBA Championship",odds:62,vol:"$8.1M",cat:"Sports",pick:"NO",edge:"FAIR"},
  {id:"k4",title:"Knicks win 2026 NBA Championship",odds:38,vol:"$6.7M",cat:"Sports",pick:"YES",edge:"+EV"},
  {id:"k5",title:"US announces new Iran sanctions before Sep 2026",odds:55,vol:"$2.8M",cat:"Politics",pick:"YES",edge:"MONITOR"},
  {id:"k6",title:"Fed cuts rates before Sep 2026",odds:48,vol:"$11.3M",cat:"Politics",pick:"YES",edge:"+EV"},
  {id:"k7",title:"Bitcoin above $100k before Aug 2026",odds:44,vol:"$9.5M",cat:"Crypto",pick:"YES",edge:"+EV"},
  {id:"k8",title:"US recession declared in 2026",odds:28,vol:"$5.1M",cat:"Stocks",pick:"NO",edge:"FAIR"},
];
const TICKERS=[{sym:"SPY",label:"S&P 500",cat:"Index"},{sym:"QQQ",label:"Nasdaq 100",cat:"Index"},{sym:"BTC-USD",label:"Bitcoin",cat:"Crypto"},{sym:"ETH-USD",label:"Ethereum",cat:"Crypto"},{sym:"NVDA",label:"NVIDIA",cat:"Stocks"},{sym:"TSLA",label:"Tesla",cat:"Stocks"},{sym:"USO",label:"Oil Fund",cat:"Energy"},{sym:"XOM",label:"Exxon",cat:"Energy"},{sym:"GLD",label:"Gold",cat:"Commodity"}];

const STORAGE_KEY = "saintbev_prediction_calls";

const DEFAULT_CALLS = [
  {id:1001,title:"BTC > $70k by June 2025",category:"Crypto",myCall:"YES",confidence:82,notes:"ETF inflows + halving cycle",outcome:"pending",date:"Apr 12, 2025",source:""},
  {id:1002,title:"Fed cuts rates in Sept",category:"Politics",myCall:"YES",confidence:65,notes:"Inflation cooling",outcome:"pending",date:"Apr 10, 2025",source:""},
  {id:1003,title:"Oil stays above $80",category:"Energy/Gas",myCall:"YES",confidence:73,notes:"OPEC cuts",outcome:"correct",date:"Mar 28, 2025",source:""},
];

function loadCalls() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return DEFAULT_CALLS;
}

function saveCalls() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(calls));
    showToast();
  } catch(e) {}
}

function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1500);
}

let calls = loadCalls();
let editId=null, activeFilter="All", activeTab="mycalls", kalshiCache={};

function fmtV(v){if(!v)return"—";if(v>=1e6)return"$"+(v/1e6).toFixed(1)+"M";if(v>=1e3)return"$"+(v/1e3).toFixed(0)+"K";return"$"+v;}

async function aiQ(msg){
  await new Promise(r=>setTimeout(r,700+Math.random()*300));
  const m=msg.toLowerCase();
  if(m.includes("hormuz")||m.includes("strait"))return"VERDICT: NO (Hormuz normal by Sep 1)\nCONFIDENCE: 72%\nREASONING: Iran avoids full closure. Tanker traffic 85% normal. Backchannels active.\nRISK: Escalation after Israeli strike.\nBET SIZE: Medium – play NO at 46¢.";
  if(m.includes("oil")||m.includes("wti"))return"VERDICT: YES (Oil above $90)\nCONFIDENCE: 68%\nREASONING: OPEC+ cuts, summer demand, geopolitical premium.\nRISK: Recession demand hit.\nBET SIZE: Small – Yes at 41¢ is +EV.";
  if(m.includes("bitcoin")||m.includes("btc"))return"VERDICT: YES (BTC > $100k)\nCONFIDENCE: 58%\nREASONING: Halving lag, ETF inflows, rate cuts mid-2026.\nRISK: Regulatory crackdown.\nBET SIZE: Small – wait for dip to 38¢.";
  if(m.includes("nba")||m.includes("spurs")||m.includes("knicks"))return"VERDICT: NO (Spurs won't win)\nCONFIDENCE: 82%\nREASONING: Too young, West stacked. 62¢ overvalued.\nRISK: Wemby unstoppable.\nBET SIZE: Medium – play NO at 38¢.";
  if(m.includes("fed")||m.includes("rate"))return"VERDICT: YES (Fed cuts by Sep)\nCONFIDENCE: 74%\nREASONING: Inflation at 2.4%, unemployment 4.1%, Powell signals cuts.\nRISK: Sticky services inflation.\nBET SIZE: Medium – Yes at 48¢ good value.";
  return"VERDICT: Lean YES\nCONFIDENCE: 65%\nREASONING: Sentiment and fundamentals align. Volume confirms.\nRISK: Headline risk.\nBET SIZE: Small to Medium.";
}

function renderStats(){
  const tot=calls.length,cor=calls.filter(c=>c.outcome==="correct").length,pen=calls.filter(c=>c.outcome==="pending").length;
  const gr=calls.filter(c=>c.outcome==="correct"||c.outcome==="incorrect").length;
  const win=gr?Math.round(cor/gr*100):null;
  const wc=win===null?"#ffd166":win>=60?"#00ff9d":win<40?"#ff4d6d":"#ffd166";
  document.getElementById("stats").innerHTML=[
    {l:"TOTAL",v:tot,c:"#fff"},{l:"WIN %",v:win!==null?win+"%":"—",c:wc},
    {l:"✅ CORRECT",v:cor,c:"#00ff9d"},{l:"⏳ PENDING",v:pen,c:"#ffd166"},
  ].map(s=>`<div class="stat-card"><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join("");
}

document.getElementById("tabBar").addEventListener("click",e=>{
  const btn=e.target.closest(".tab"); if(!btn)return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  const tab=btn.dataset.tab; activeTab=tab;
  ["mycalls","kalshi","markets","stocks","ai"].forEach(p=>document.getElementById(p).classList.toggle("hidden",p!==tab));
  if(tab==="kalshi")renderKalshi();
  if(tab==="markets")renderMarkets();
  if(tab==="stocks")renderStocks();
  if(tab==="ai")renderAI();
});

function renderCalls(){
  const cats=["All","Crypto","Politics","Energy/Gas","Geopolitics","Stocks","Other","Sports"];
  const filtered=activeFilter==="All"?calls:calls.filter(c=>c.category===activeFilter);
  let h=`<div class="filter-bar">`+cats.map(cat=>{
    const col=CAT_COLOR[cat]||"#a78bfa",on=activeFilter===cat;
    return`<button class="fbtn${on?" on":""}" style="${on?"background:"+col+";color:#000":""}" onclick="setF('${cat}')">${cat}</button>`;
  }).join("")+`</div>`;
  if(!filtered.length){h+=`<div class="empty">No predictions yet — tap + New call</div>`;}
  filtered.forEach(c=>{
    const col=CAT_COLOR[c.category]||"#aaa";
    h+=`<div class="ccard">
      <div class="ctop">
        <div><span class="ctag" style="background:${col}22;color:${col}">${c.category}</span>
        <div class="ctitle">${c.title} <span style="font-size:12px;color:#b9b9e6">• ${c.myCall}</span></div></div>
        <div class="cacts">
          <select onchange="updOut(${c.id},this.value)">
            <option value="pending"${c.outcome==="pending"?" selected":""}>⏳ Pending</option>
            <option value="correct"${c.outcome==="correct"?" selected":""}>✅ Correct</option>
            <option value="incorrect"${c.outcome==="incorrect"?" selected":""}>❌ Incorrect</option>
          </select>
          <button class="ibtn" onclick="openEdit(${c.id})">✏️</button>
          <button class="ibtn dbtn" onclick="delCall(${c.id})">🗑️</button>
        </div>
      </div>
      <div class="clbl"><span>Confidence</span><span>${c.confidence}%</span></div>
      <div class="cbar"><div class="cfill" style="width:${c.confidence}%"></div></div>
      ${c.notes?`<div class="cnotes">${c.notes}</div>`:""}
      <div class="cdate">📅 ${c.date}</div>
    </div>`;
  });
  document.getElementById("mycalls").innerHTML=h;
}
function setF(cat){activeFilter=cat;renderCalls();}
function updOut(id,val){calls=calls.map(c=>c.id===id?{...c,outcome:val}:c);saveCalls();renderStats();renderCalls();}
function delCall(id){if(confirm("Delete?")){calls=calls.filter(c=>c.id!==id);saveCalls();renderStats();renderCalls();}}

function openModal(){
  editId=null;
  document.getElementById("mtitle").textContent="➕ New prediction";
  document.getElementById("mTitle").value="";
  document.getElementById("mCat").value="Crypto";
  document.getElementById("mCall").value="YES";
  document.getElementById("mConf").value=70;
  document.getElementById("confLbl").textContent="Confidence: 70%";
  document.getElementById("mOut").value="pending";
  document.getElementById("mSrc").value="";
  document.getElementById("mNotes").value="";
  document.getElementById("modal").classList.remove("hidden");
}
function openEdit(id){
  const c=calls.find(x=>x.id===id);if(!c)return;
  editId=id;
  document.getElementById("mtitle").textContent="✏️ Edit prediction";
  document.getElementById("mTitle").value=c.title;
  document.getElementById("mCat").value=c.category;
  document.getElementById("mCall").value=c.myCall;
  document.getElementById("mConf").value=c.confidence;
  document.getElementById("confLbl").textContent="Confidence: "+c.confidence+"%";
  document.getElementById("mOut").value=c.outcome;
  document.getElementById("mSrc").value=c.source||"";
  document.getElementById("mNotes").value=c.notes||"";
  document.getElementById("modal").classList.remove("hidden");
}
function closeModal(){document.getElementById("modal").classList.add("hidden");}

document.getElementById("btnNew").addEventListener("click",openModal);
document.getElementById("btnClose").addEventListener("click",closeModal);
document.getElementById("btnCancel").addEventListener("click",closeModal);
document.getElementById("mConf").addEventListener("input",function(){document.getElementById("confLbl").textContent="Confidence: "+this.value+"%";});
document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeModal();});
document.getElementById("btnSave").addEventListener("click",function(){
  const title=document.getElementById("mTitle").value.trim();
  if(!title){alert("Add a title");return;}
  const d={title,category:document.getElementById("mCat").value,myCall:document.getElementById("mCall").value,
    confidence:parseInt(document.getElementById("mConf").value),outcome:document.getElementById("mOut").value,
    source:document.getElementById("mSrc").value.trim(),notes:document.getElementById("mNotes").value.trim(),
    date:new Date().toLocaleDateString()};
  if(editId){calls=calls.map(c=>c.id===editId?{...c,...d}:c);}
  else{calls.unshift({id:Date.now(),...d});}
  saveCalls();
  closeModal();renderStats();renderCalls();
});

function renderKalshi(){
  let h=`<div class="aibox"><div class="ailbl">ASK KALSHI AI</div>
    <div class="airow"><input class="aiinput" id="kq" placeholder="Hormuz? NBA? Oil above $85?">
    <button class="aibtn" id="kbtn" onclick="askK()">ANALYZE →</button></div>
    <div id="kr"></div></div>
    <div class="rowbar"><h3>🎯 Kalshi Markets</h3><a href="https://kalshi.com" target="_blank" style="color:#a78bfa;font-size:12px;text-decoration:none">Open Kalshi →</a></div>`;
  KM.forEach(m=>{
    const e=EDGE[m.edge]||EDGE["FAIR"],pc=m.pick==="YES"?"#00ff9d":"#ff4d6d";
    h+=`<div class="kcard" id="kc-${m.id}"><div class="kinner">
      <div class="krow"><div style="flex:1">
        <div class="kbadges"><span class="kedge" style="background:${e.bg};border:1px solid ${e.br};color:${e.tx}">${m.edge}</span>
        <span class="kcat">${m.cat.toUpperCase()}</span><span class="kvol">${m.vol}</span></div>
        <div class="ktitle">${m.title}</div>
      </div><div class="kright"><div class="kpick" style="color:${pc}">${m.pick}</div><div class="kodds">${m.odds}¢ YES</div></div></div>
      <div class="kbtns"><button class="kdive" id="kd-${m.id}" onclick="deepDive('${m.id}')">→ AI DEEP DIVE</button>
      <a class="klink" href="https://kalshi.com" target="_blank">KALSHI ↗</a></div>
    </div><div id="ka-${m.id}" class="kanalysis hidden"></div></div>`;
  });
  document.getElementById("kalshi").innerHTML=h;
  document.getElementById("kq").addEventListener("keydown",e=>{if(e.key==="Enter")askK();});
  KM.forEach(m=>{if(kalshiCache[m.id]){const el=document.getElementById("ka-"+m.id);if(el){el.innerHTML=kaHTML(m.id,kalshiCache[m.id]);el.classList.remove("hidden");}}});
}
function kaHTML(id,text){const e=EDGE[KM.find(m=>m.id===id)?.edge]||EDGE["FAIR"];return`<div style="font-size:10px;color:${e.tx};letter-spacing:2px;margin-bottom:8px">◆ AI DEEP DIVE</div><div style="font-size:13px;color:#bbb;line-height:1.8;white-space:pre-wrap">${text}</div>`;}
async function askK(){
  const q=document.getElementById("kq").value.trim();if(!q)return;
  const btn=document.getElementById("kbtn");btn.disabled=true;btn.textContent="...";
  const text=await aiQ(q);
  document.getElementById("kr").innerHTML=`<div class="aires"><div class="ailbl">AI ANALYSIS</div>${text}</div>`;
  btn.disabled=false;btn.textContent="ANALYZE →";
}
async function deepDive(id){
  const m=KM.find(x=>x.id===id);if(!m)return;
  const btn=document.getElementById("kd-"+id);btn.textContent="⟳ SEARCHING...";
  const text=await aiQ("Market: "+m.title+" Odds: "+m.odds+"¢ "+m.cat);
  kalshiCache[id]=text;
  const el=document.getElementById("ka-"+id);
  el.innerHTML=kaHTML(id,text);el.classList.remove("hidden");
  btn.textContent="→ AI DEEP DIVE";
}

async function renderMarkets(){
  document.getElementById("markets").innerHTML=`<div class="rowbar"><h3>📊 Polymarket</h3><button class="rbtn" onclick="renderMarkets()">⟳ refresh</button></div><div id="pl"><div style="text-align:center;padding:40px;color:#777">loading ...</div></div>`;
  try{
    const r=await fetch("https://corsproxy.io/?url=https://gamma-api.polymarket.com/markets?closed=false&limit=20&order=volume&ascending=false");
    const d=await r.json();
    if(!Array.isArray(d))throw 0;
    document.getElementById("pl").innerHTML=d.slice(0,20).map(m=>{
      let odds=50;try{if(m.outcomePrices){const p=JSON.parse(m.outcomePrices);if(p[0])odds=parseFloat(p[0])*100;}else if(m.yesBid)odds=parseFloat(m.yesBid)*100;}catch(e){}
      const vol=m.volume24hr?parseFloat(m.volume24hr):(m.volume?parseFloat(m.volume):0);
      return`<a class="pcard" href="https://polymarket.com/market/${m.slug||m.id}" target="_blank">
        <div class="pq">${m.question||"Market"}</div>
        <div style="display:flex;gap:10px;align-items:center"><span class="podds">${odds.toFixed(1)}%</span><span class="pvol">${fmtV(vol)}</span></div></a>`;
    }).join("");
  }catch(e){document.getElementById("pl").innerHTML=`<div style="text-align:center;padding:40px;color:#ff6b6b;font-size:13px">⚠️ Could not load Polymarket.<br><a href="https://polymarket.com" target="_blank" style="color:#a78bfa">Open Polymarket →</a></div>`;}
}

async function renderStocks(){
  document.getElementById("stocks").innerHTML=`<div class="rowbar"><h3>📈 Watchlist</h3><button class="rbtn" onclick="renderStocks()">🔄 update</button></div><div style="text-align:center;padding:40px;color:#777">fetching data ...</div>`;
  const res=[];
  for(const t of TICKERS){
    try{const r=await fetch("https://corsproxy.io/?url=https://query1.finance.yahoo.com/v8/finance/chart/"+t.sym+"?interval=1d&range=5d");
      const j=await r.json(),meta=j.chart?.result?.[0]?.meta;
      if(meta){const cur=meta.regularMarketPrice,prev=meta.previousClose,ch=cur-prev;res.push({...t,price:cur,change:ch,pct:ch/prev*100});}
      else res.push({...t,price:null});
    }catch(e){res.push({...t,price:null});}
  }
  let h=`<div class="rowbar"><h3>📈 Watchlist</h3><button class="rbtn" onclick="renderStocks()">🔄 update</button></div><div class="sgrid">`;
  res.forEach(q=>{const cc=q.change>=0?"#1db954":"#ff5e6e";
    h+=`<div class="scard"><div class="stop"><span class="sname">${q.label}</span><span class="ssym">${q.sym}</span></div>
    <div class="sprice">${q.price!=null?"$"+q.price.toFixed(2):"—"}</div>
    ${q.change!=null?`<div class="schange" style="color:${cc}">${q.change>=0?"▲":"▼"} ${Math.abs(q.change).toFixed(2)} (${q.pct.toFixed(2)}%)</div>`:""}
    <div class="scat">${q.cat}</div></div>`;
  });
  document.getElementById("stocks").innerHTML=h+"</div>";
}

function renderAI(){
  const tot=calls.length,cor=calls.filter(c=>c.outcome==="correct").length,pen=calls.filter(c=>c.outcome==="pending").length;
  const gr=calls.filter(c=>c.outcome==="correct"||c.outcome==="incorrect").length;
  const acc=gr?Math.round(cor/gr*100):null;
  document.getElementById("ai").innerHTML=`
    <div class="aihero">
      <div style="font-size:38px;margin-bottom:8px">🤖</div>
      <div style="font-size:20px;font-weight:800;margin-bottom:4px">BEV·AI</div>
      <div style="color:#bcbce6;font-size:13px">Personal prediction analyst. Ask anything about Kalshi, Polymarket, stocks, geopolitics.</div>
      <div class="aisnap">
        <div style="font-weight:600;font-size:13px">📋 Your edge snapshot</div>
        <div class="aisnapstats">
          <div><span style="color:#a78bfa;font-size:11px">Calls tracked</span><br><span style="font-size:24px;font-weight:800">${tot}</span></div>
          <div><span style="color:#00ff9d;font-size:11px">Win rate</span><br><span style="font-size:24px;font-weight:800">${acc!==null?acc+"%":"—"}</span></div>
          <div><span style="color:#ffd166;font-size:11px">Pending</span><br><span style="font-size:24px;font-weight:800">${pen}</span></div>
        </div>
      </div>
    </div>
    <div class="aibox"><div class="ailbl">ASK BEV·AI</div>
      <div class="airow"><input class="aiinput" id="aiq" placeholder="Hormuz? Oil? NBA Finals? Best Kalshi bet?">
      <button class="aibtn" id="aibtn" onclick="askAI()">→</button></div>
      <div id="air"></div>
    </div>`;
  document.getElementById("aiq").addEventListener("keydown",e=>{if(e.key==="Enter")askAI();});
}
async function askAI(){
  const q=document.getElementById("aiq").value.trim();if(!q)return;
  const btn=document.getElementById("aibtn");btn.disabled=true;btn.textContent="...";
  const text=await aiQ(q);
  document.getElementById("air").innerHTML=`<div class="aires"><div class="ailbl">BEV·AI ANALYSIS</div>${text}</div>`;
  btn.disabled=false;btn.textContent="→";
}

renderStats();
renderCalls();
</script>
